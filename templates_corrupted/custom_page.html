{% extends 'base.html' %}
{% load static %}

{% block content %}
	<!-- Banner Section Three -->
	<section class="banner-section-three">
		<div class="pattern-layer-two" style="background-image: url({% static 'images/background/pattern-21.png' %})"></div>
		<div class="auto-container">
			<!-- Page Breadcrumb -->
			<ul class="page-breadcrumb">
				<li><a href="{% url 'index' %}">home</a></li>
				<li>{{ page.title }}</li>
			</ul>
            <div class="row clearfix">
				
				<!-- Content Column -->
				<div class="content-column col-lg-8 col-md-12 col-sm-12">
					<div class="inner-column">
						<div class="pattern-layer-one" style="background-image: url({% static 'images/main-slider/pattern-1.png' %})"></div>
						<div class="icon-layer" style="background-image: url({% static 'images/icons/icon-2.png' %})"></div>
						<div class="icon-layer-two" style="background-image: url({% static 'images/icons/icon-5.png' %})"></div>
						<h2>{{ page.title }}</h2>
					</div>
				</div>
				
				<!-- Images Column -->
				<div class="image-column col-lg-4 col-md-12 col-sm-12">
					<div class="inner-column">
						<div class="icon-layer-three" style="background-image: url({% static 'images/icons/icon-3.png' %})"></div>
						<div class="icon-layer-four" style="background-image: url({% static 'images/icons/icon-2.png' %})"></div>
						<div class="icon-layer-five" style="background-image: url({% static 'images/icons/icon-4.png' %})"></div>
						<div class="image">
							<img src="{% if page.banner_image %}{{ page.banner_image.url }}{% else %}{% static 'images/resource/page-title-4.png' %}{% endif %}" alt="" />
						</div>
						<div class="image-two">
							<img src="{% static 'images/resource/page-title-2.png' %}" alt="" />
						</div>
					</div>
				</div>
				
			</div>
		</div>
	</section>
	<!-- End Banner Section Three -->

    <!-- Custom Content Section -->
    <section class="custom-content-section" style="padding: 100px 0px;">
        <div class="auto-container">
            <div class="content-inner">
                {{ page.content|safe }}
            </div>
        </div>
    </section>
    <!-- End Custom Content Section -->
{% endblock %}
